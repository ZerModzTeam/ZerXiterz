<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZERMODZ TEAM | V27</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <canvas id="star-canvas"></canvas>
    
    <nav>
        <div class="logo">ZERMODZ <span>TEAM</span></div>
        <div class="menu-btn" onclick="toggleSide()"><i class="fas fa-bars"></i></div>
    </nav>

    <div class="sidebar" id="sidebar">
        <div class="side-header">
            <h3>NAVIGASI</h3>
            <div class="btn-exit-custom" onclick="toggleSide()"><i class="fas fa-times"></i></div>
        </div>
        <div class="side-item" onclick="openLogin()"><i class="fas fa-lock"></i> <span>Admin Panel</span></div>
        <p class="side-label">SOCIAL MEDIA</p>
        <a href="https://tiktok.com/@zaraxitnd" target="_blank" class="side-item"><i class="fab fa-tiktok"></i> <span>TikTok</span></a>
        <a href="https://youtube.com/@csrvipx_ofc1" target="_blank" class="side-item"><i class="fab fa-youtube"></i> <span>YouTube Utama</span></a>
        <a href="https://youtube.com/@ZMTEAM0" target="_blank" class="side-item"><i class="fab fa-youtube"></i> <span>YouTube Second</span></a>
        <a href="https://www.instagram.com/zeroxit44" target="_blank" class="side-item"><i class="fab fa-instagram"></i> <span>Instagram</span></a>
        <a href="https://whatsapp.com/channel/0029VaG6" target="_blank" class="side-item"><i class="fas fa-bullhorn"></i> <span>Saluran WA</span></a>
        <p class="side-label">SUPPORT</p>
        <a href="https://chat.whatsapp.com/JBW6fNk5KwiGRWCaPVmr8T" target="_blank" class="side-item cs-btn"><i class="fas fa-headset"></i> <span>CS ZERMODZ</span></a>
    </div>

    <div class="main-body">
        <div class="search-wrapper">
            <input type="text" id="search" placeholder="Cari cheat kamu..." onkeyup="load()">
        </div>

        <div class="main-cat-grid">
            <div class="cat-box active" id="c-apk" onclick="changeM('APK')">
                <i class="fab fa-android"></i>
                <p>APK MOD</p>
            </div>
            <div class="cat-box" id="c-file" onclick="changeM('FILE')">
                <i class="fas fa-file-zipper"></i>
                <p>FILES</p>
            </div>
        </div>

        <div id="sub-container" class="sub-pill-container"></div>
        <div class="product-container" id="list"></div>
    </div>

    <div id="overlay-action" class="overlay">
        <div class="modal-box" id="login-form" style="display:none;">
            <i class="fas fa-user-lock" style="font-size: 50px; color: var(--p); margin-bottom: 20px;"></i>
            <h2>ADMIN LOGIN</h2>
            <input type="text" id="adm-u" placeholder="USERNAME">
            <input type="password" id="adm-p" placeholder="PASSWORD">
            <button onclick="auth()" class="btn-cyan">SIGN IN</button>
            <p onclick="closeOverlay()" style="color:#555; margin-top:20px; cursor:pointer;">Batal</p>
        </div>
        <div id="status-ui" style="display:none;">
            <div class="loader-circle"></div>
            <h2 id="l-text" style="color:white; margin-top:20px;">WAIT...</h2>
        </div>
    </div>

    <div id="admin-panel" class="admin-panel">
        <div class="admin-header">
            <h2 id="adm-title">DASHBOARD</h2>
            <div class="btn-exit-custom" onclick="exitAdmin()"><i class="fas fa-times"></i></div>
        </div>
        <div class="admin-content">
            <input type="hidden" id="p-id">
            <input type="text" id="p-name" placeholder="Nama Cheat">
            <input type="number" id="p-price" placeholder="Harga (K)">
            <input type="number" id="p-dur" placeholder="Durasi (Day)">
            <select id="p-sub"></select>
            <button onclick="save()" class="btn-cyan">PUBLISH PRODUCT</button>
            <div id="adm-list" style="margin-top:25px;"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="script.js"></script>
</body>
</html>
