<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZERMODZ TEAM | V27 UI REBORN</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <canvas id="star-canvas"></canvas>
    
    <div id="overlay-action" class="overlay">
        <div class="box" id="login-form" style="display:none;">
            <i class="fas fa-user-shield" style="font-size: 50px; color: var(--p); margin-bottom: 20px;"></i>
            <h2>ADMIN ACCESS</h2>
            <input type="text" id="adm-u" placeholder="USERNAME">
            <input type="password" id="adm-p" placeholder="PASSWORD">
            <button onclick="auth()" class="btn-main">LOGIN</button>
            <p onclick="closeOverlay()" style="margin-top:20px; cursor:pointer; color:gray;">Batal</p>
        </div>

        <div id="status-ui" style="display:none; text-align: center;">
            <div class="loader" id="l-spin"></div>
            <div id="l-success" class="success-icon" style="display:none;"><i class="fas fa-check-circle"></i></div>
            <div id="l-error" class="error-icon" style="display:none;"><i class="fas fa-times-circle"></i></div>
            <h2 id="l-text" style="margin-top:20px; color:#fff;">WAIT...</h2>
        </div>
    </div>

    <nav>
        <div class="logo">ZERMODZ <span>TEAM</span></div>
        <i class="fas fa-bars-staggered" onclick="toggleSide()"></i>
    </nav>

    <div class="sidebar" id="sidebar">
        <div class="side-header">
            <h3>MENU</h3>
            <div class="btn-exit-custom" onclick="toggleSide()"><i class="fas fa-times"></i></div>
        </div>
        <div class="side-link" onclick="openLogin()"><i class="fas fa-lock"></i> Admin Panel</div>
        
        <p class="side-label">SOCIAL MEDIA</p>
        <a href="https://tiktok.com/@zaraxitnd" target="_blank" class="side-link"><i class="fab fa-tiktok"></i> TikTok</a>
        <a href="https://youtube.com/@csrvipx_ofc1" target="_blank" class="side-link"><i class="fab fa-youtube"></i> YouTube</a>
        <a href="https://www.instagram.com/zeroxit44" target="_blank" class="side-link"><i class="fab fa-instagram"></i> Instagram</a>
        
        <p class="side-label">CUSTOMER SERVICE</p> <a href="https://chat.whatsapp.com/LpxmG92N9u1D8m7XjLhPzB" target="_blank" class="side-link" style="background: #25d366; color: #000;"><i class="fab fa-whatsapp"></i> HUBUNGI CS (GRUP)</a>
    </div>

    <div class="search-container">
        <input type="text" class="search-bar" id="search" placeholder="Cari cheat favoritmu..." onkeyup="load()">
    </div>

    <div class="cats">
        <div class="cat-card active" id="c-apk" onclick="changeM('APK')"><i class="fab fa-android"></i><p>APK MOD</p></div>
        <div class="cat-card" id="c-file" onclick="changeM('FILE')"><i class="fas fa-file-zipper"></i><p>FILES</p></div>
    </div>

    <div id="sub-container"></div>
    <div class="grid" id="list"></div>

    <div id="admin-panel" class="admin-full">
        <div class="admin-header">
            <h1 id="adm-title">ADD PRODUCT</h1>
            <div class="btn-exit-custom" onclick="exitAdmin()"><i class="fas fa-times"></i></div>
        </div>
        <div class="admin-box">
            <input type="hidden" id="p-id">
            <input type="text" id="p-name" placeholder="Nama Produk">
            <input type="number" id="p-dur" placeholder="Berapa Hari? (Contoh: 30)">
            <input type="number" id="p-price" placeholder="Harga Berapa K? (Contoh: 50)">
            <div class="admin-cat-sel">
                <button onclick="setADM('APK')" id="adm-apk">APK</button>
                <button onclick="setADM('FILE')" id="adm-file">FILE</button>
            </div>
            <select id="p-sub"></select>
            <button onclick="save()" id="btn-save" class="btn-publish">PUBLISH PRODUCT</button>
            <button onclick="cancelEdit()" id="btn-cancel" style="display:none; margin-top:10px; background:#444; color:#fff;" class="btn-publish">BATAL EDIT</button>
        </div>
        <h3 style="margin: 30px 0 10px; color: var(--p); border-left: 3px solid var(--p); padding-left:10px;">MANAGE PRODUCTS</h3>
        <div id="adm-list"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="script.js"></script>
</body>
</html>
